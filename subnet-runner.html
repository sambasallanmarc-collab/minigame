<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SUBNET // RUNNER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --accent: #7FE7C4;
    --danger: #E8637A;
    --bg: #14161C;
    --dim: rgba(255,255,255,0.38);
  }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: #F2F4F5;
    font-family: 'IBM Plex Mono', monospace;
    overflow-x: hidden;
  }

  .root {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 28px;
  }

  .title {
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--dim);
    margin-bottom: 28px;
  }

  .readout {
    font-size: 64px;
    font-weight: 600;
    line-height: 1;
    color: var(--accent);
    transition: color 0.3s;
    font-variant-numeric: tabular-nums;
  }
  .readout.urgent { color: var(--danger); animation: tick 0.5s steps(1) infinite; }
  @keyframes tick { 50% { opacity: 0.55; } }
  @media (prefers-reduced-motion: reduce) { .readout.urgent { animation: none; } }

  .readout-label {
    font-size: 10px;
    letter-spacing: 0.28em;
    color: var(--dim);
    margin-top: 4px;
    margin-bottom: 26px;
  }

  .meta {
    display: flex;
    gap: 28px;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--dim);
    margin-bottom: 22px;
  }
  .meta b { color: #F2F4F5; font-weight: 600; }

  .lives { display: flex; gap: 6px; margin-bottom: 26px; }
  .life-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); }
  .life-dot.on { background: var(--accent); }

  .grid-wrap {
    width: min(84vw, 380px);
    aspect-ratio: 1;
    position: relative;
  }
  .grid-board {
    display: grid;
    width: 100%;
    height: 100%;
    gap: 3px;
  }
  .cell {
    background: rgba(255,255,255,0.04);
    border-radius: 3px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .cell.warn { background: rgba(232,99,122,0.22); }
  .cell.hot { background: var(--danger); }

  .dest {
    width: 40%;
    height: 40%;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0.85;
  }
  .player {
    width: 46%;
    height: 46%;
    border-radius: 4px;
    background: var(--accent);
  }
  .player.invuln { animation: blink 0.15s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0.25; } }

  .controls {
    margin-top: 30px;
    display: grid;
    grid-template-columns: repeat(3, 46px);
    grid-template-rows: repeat(3, 46px);
    gap: 6px;
  }
  .dbtn {
    border: none;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
    color: var(--dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    touch-action: manipulation;
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .dbtn:active { background: rgba(127,231,196,0.18); color: var(--accent); }
  .dbtn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }

  .hint {
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--dim);
  }

  .flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.1s;
  }

  .overlay {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(20,22,28,0.94);
    z-index: 10;
    padding: 20px;
  }
  .overlay.show { display: flex; }
  .card { max-width: 300px; text-align: center; }
  .card h2 {
    font-size: 15px;
    letter-spacing: 0.18em;
    font-weight: 600;
    margin: 0 0 12px;
  }
  .card p {
    font-size: 12px;
    color: var(--dim);
    line-height: 1.7;
    margin: 0 0 22px;
  }
  .btn {
    font-family: 'IBM Plex Mono', monospace;
    border: none;
    border-bottom: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    padding: 6px 4px 8px;
    font-size: 12px;
    letter-spacing: 0.14em;
    cursor: pointer;
  }
  .btn:hover { opacity: 0.75; }
</style>
</head>
<body>

<div class="root">
  <div class="title">SUBNET // RUNNER</div>

  <div class="readout" id="readout">10.0</div>
  <div class="readout-label">SECONDS TO DROP</div>

  <div class="meta">
    <span>ROUTE <b id="scoreLabel">00</b></span>
    <span>LEVEL <b id="levelLabel">01</b></span>
  </div>

  <div class="lives" id="lives">
    <div class="life-dot on"></div>
    <div class="life-dot on"></div>
    <div class="life-dot on"></div>
  </div>

  <div class="grid-wrap">
    <div class="grid-board" id="board"></div>
    <div class="flash" id="flash"></div>

    <div class="overlay show" id="overlay">
      <div class="card">
        <h2 id="cardTitle">BEGIN TRANSMISSION</h2>
        <p id="cardText">Move the packet to the open node before time runs out. Red cells drop the connection. Three retries.</p>
        <button class="btn" id="cardBtn">START</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <div></div>
    <div class="dbtn" data-dx="0" data-dy="-1"><svg viewBox="0 0 24 24"><path d="M12 19V5M5 12l7-7 7 7"/></svg></div>
    <div></div>
    <div class="dbtn" data-dx="-1" data-dy="0"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg></div>
    <div></div>
    <div class="dbtn" data-dx="1" data-dy="0"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
    <div></div>
    <div class="dbtn" data-dx="0" data-dy="1"><svg viewBox="0 0 24 24"><path d="M12 5v14M19 12l-7 7-7-7"/></svg></div>
    <div></div>
  </div>

  <div class="hint">or use arrow keys / WASD</div>
</div>

<script>
(function () {
  const GRID = 9;
  const boardEl = document.getElementById('board');
  const readoutEl = document.getElementById('readout');
  const scoreLabelEl = document.getElementById('scoreLabel');
  const levelLabelEl = document.getElementById('levelLabel');
  const livesEl = document.getElementById('lives');
  const flashEl = document.getElementById('flash');
  const overlayEl = document.getElementById('overlay');
  const cardTitleEl = document.getElementById('cardTitle');
  const cardTextEl = document.getElementById('cardText');
  const cardBtnEl = document.getElementById('cardBtn');

  let status = 'ready'; // ready | playing | gameover
  let player = { x: 0, y: 0 };
  let dest = { x: GRID - 1, y: GRID - 1 };
  let hotCells = []; // {id,x,y,phase,elapsed}
  let lives = 3;
  let score = 0;
  let level = 1;
  let ttl = ttlMaxFor(1);
  let invuln = false;
  let lastMove = 0;
  let spawnTimer = 0;
  let tickInterval = null;

  function ttlMaxFor(lv) { return Math.max(6000, 10000 - lv * 300); }

  function randCell(exclude) {
    exclude = exclude || [];
    let pos, tries = 0;
    do {
      pos = { x: Math.floor(Math.random() * GRID), y: Math.floor(Math.random() * GRID) };
      tries++;
    } while (exclude.some((e) => e.x === pos.x && e.y === pos.y) && tries < 200);
    return pos;
  }

  function maxHotFor(lv) { return Math.min(2 + Math.floor(lv / 2), 6); }
  function spawnIntervalFor(lv) { return Math.max(1500 - lv * 60, 700); }

  // build grid cells once
  const cellEls = [];
  boardEl.style.gridTemplateColumns = `repeat(${GRID},1fr)`;
  boardEl.style.gridTemplateRows = `repeat(${GRID},1fr)`;
  for (let i = 0; i < GRID * GRID; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    boardEl.appendChild(cell);
    cellEls.push(cell);
  }

  function render() {
    for (let i = 0; i < cellEls.length; i++) {
      const x = i % GRID, y = Math.floor(i / GRID);
      const cell = cellEls[i];
      cell.className = 'cell';
      cell.innerHTML = '';

      const hot = hotCells.find((c) => c.x === x && c.y === y);
      if (hot && hot.phase === 'warn') cell.classList.add('warn');
      if (hot && hot.phase === 'hot') cell.classList.add('hot');

      const isPlayer = player.x === x && player.y === y;
      const isDest = dest.x === x && dest.y === y;

      if (isDest && !isPlayer) {
        const d = document.createElement('div');
        d.className = 'dest';
        cell.appendChild(d);
      }
      if (isPlayer) {
        const p = document.createElement('div');
        p.className = 'player' + (invuln ? ' invuln' : '');
        cell.appendChild(p);
      }
    }

    readoutEl.textContent = (ttl / 1000).toFixed(1);
    const ttlPct = Math.max(0, Math.min(100, (ttl / ttlMaxFor(level)) * 100));
    readoutEl.classList.toggle('urgent', ttlPct < 25);

    scoreLabelEl.textContent = String(score).padStart(2, '0');
    levelLabelEl.textContent = String(level).padStart(2, '0');

    const dots = livesEl.children;
    for (let i = 0; i < dots.length; i++) {
      dots[i].classList.toggle('on', i < lives);
    }
  }

  function doFlash(kind) {
    flashEl.style.background = kind === 'danger' ? 'rgba(232,99,122,0.18)' : 'rgba(127,231,196,0.14)';
    flashEl.style.opacity = '1';
    setTimeout(() => { flashEl.style.opacity = '0'; }, 250);
  }

  function showOverlay(kind) {
    if (kind === 'ready') {
      cardTitleEl.textContent = 'BEGIN TRANSMISSION';
      cardTextEl.textContent = 'Move the packet to the open node before time runs out. Red cells drop the connection. Three retries.';
      cardBtnEl.textContent = 'START';
    } else {
      cardTitleEl.textContent = 'CONNECTION DROPPED';
      cardTextEl.textContent = `${score} route${score === 1 ? '' : 's'} delivered · level ${level}`;
      cardBtnEl.textContent = 'RETRY';
    }
    overlayEl.classList.add('show');
  }
  function hideOverlay() { overlayEl.classList.remove('show'); }

  function loseLife() {
    doFlash('danger');
    lives -= 1;
    if (lives <= 0) {
      status = 'gameover';
      stopTicking();
      render();
      showOverlay('gameover');
      return;
    }
    invuln = true;
    setTimeout(() => { invuln = false; render(); }, 1000);
    player = { x: 0, y: 0 };
    hotCells = [];
    ttl = ttlMaxFor(level);
    render();
  }

  function arriveIfNeeded() {
    if (player.x === dest.x && player.y === dest.y) {
      doFlash('success');
      score += 1;
      const newLevel = score % 3 === 0 ? level + 1 : level;
      level = newLevel;
      const p = { x: 0, y: 0 };
      const d = randCell([p]);
      player = p;
      dest = d;
      hotCells = [];
      ttl = ttlMaxFor(newLevel);
    }
  }

  function tick() {
    ttl -= 100;
    if (ttl <= 0) {
      ttl = ttlMaxFor(level);
      loseLife();
      return;
    }

    spawnTimer += 100;
    hotCells = hotCells
      .map((c) => ({ ...c, elapsed: c.elapsed + 100 }))
      .map((c) => {
        if (c.phase === 'warn' && c.elapsed >= 600) return { ...c, phase: 'hot', elapsed: 0 };
        if (c.phase === 'hot' && c.elapsed >= 900) return null;
        return c;
      })
      .filter(Boolean);

    const maxHot = maxHotFor(level);
    if (spawnTimer >= spawnIntervalFor(level) && hotCells.length < maxHot) {
      spawnTimer = 0;
      const exclude = [player, dest, ...hotCells.map((c) => ({ x: c.x, y: c.y }))];
      const pos = randCell(exclude);
      hotCells.push({ id: Math.random(), x: pos.x, y: pos.y, phase: 'warn', elapsed: 0 });
    }

    if (!invuln) {
      const hit = hotCells.some((c) => c.phase === 'hot' && c.x === player.x && c.y === player.y);
      if (hit) { loseLife(); return; }
    }

    render();
  }

  function startTicking() {
    stopTicking();
    tickInterval = setInterval(tick, 100);
  }
  function stopTicking() {
    if (tickInterval) clearInterval(tickInterval);
    tickInterval = null;
  }

  function move(dx, dy) {
    if (status !== 'playing') return;
    const now = Date.now();
    if (now - lastMove < 130) return;
    lastMove = now;
    const nx = Math.min(GRID - 1, Math.max(0, player.x + dx));
    const ny = Math.min(GRID - 1, Math.max(0, player.y + dy));
    if (nx === player.x && ny === player.y) return;
    player = { x: nx, y: ny };
    arriveIfNeeded();
    render();
  }

  function startGame() {
    score = 0;
    lives = 3;
    level = 1;
    const p = { x: 0, y: 0 };
    const d = randCell([p]);
    player = p;
    dest = d;
    hotCells = [];
    ttl = ttlMaxFor(1);
    invuln = false;
    status = 'playing';
    hideOverlay();
    render();
    startTicking();
  }

  cardBtnEl.addEventListener('click', startGame);

  document.querySelectorAll('.dbtn').forEach((btn) => {
    btn.addEventListener('click', () => {
      move(parseInt(btn.dataset.dx, 10), parseInt(btn.dataset.dy, 10));
    });
  });

  const keyMap = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0],
  };
  window.addEventListener('keydown', (e) => {
    if (keyMap[e.key]) {
      e.preventDefault();
      move(keyMap[e.key][0], keyMap[e.key][1]);
    }
  });

  showOverlay('ready');
  render();
})();
</script>
</body>
</html>
